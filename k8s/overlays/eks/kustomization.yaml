apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patchesStrategicMerge:
  - storageclass-patch.yaml

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/metadata/annotations/iam.amazonaws.com~1role
        value: arn:aws:iam::ACCOUNT_ID:role/internal-agents-pod-role

commonLabels:
  cloud: eks
  deployment-type: cloud-agnostic
