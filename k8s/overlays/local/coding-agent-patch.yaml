apiVersion: batch/v1
kind: CronJob
metadata:
  name: coding-agent-scheduled
  namespace: ai-agents
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: coding-agent
              # Use local image (no registry push needed with kind/minikube)
              image: internal-agents/coding-agent:local
              imagePullPolicy: Never
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
