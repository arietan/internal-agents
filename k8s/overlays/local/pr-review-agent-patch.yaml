apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-review-agent-webhook
  namespace: ai-agents
spec:
  template:
    spec:
      containers:
        - name: webhook
          image: internal-agents/pr-review-agent:local
          imagePullPolicy: Never
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
