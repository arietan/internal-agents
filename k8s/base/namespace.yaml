apiVersion: v1
kind: Namespace
metadata:
  name: ai-agents
  labels:
    app.kubernetes.io/part-of: internal-agents
    purpose: agentic-ai
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: agent-quota
  namespace: ai-agents
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    count/jobs.batch: "20"
    count/pods: "30"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-default-deny
  namespace: ai-agents
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS egress (GitHub API, LLM APIs)
    - to: []
      ports:
        - port: 443
          protocol: TCP
    # Allow HTTP egress to ai-models namespace (Ollama, vLLM, LiteLLM)
    # and ai-observability namespace (OTel Collector, Langfuse)
    - to:
        - namespaceSelector:
            matchLabels:
              purpose: agentic-ai
      ports:
        - port: 80
          protocol: TCP
        - port: 3000
          protocol: TCP
        - port: 4000
          protocol: TCP
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
        - port: 8000
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 9464
          protocol: TCP
        - port: 11434
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress
  namespace: ai-agents
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: webhook
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
