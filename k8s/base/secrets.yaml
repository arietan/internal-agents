# TEMPLATE — Do not commit real secrets. Use sealed-secrets, external-secrets,
# or your cluster's secret management to populate these at deploy time.
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: ai-agents
  labels:
    app.kubernetes.io/part-of: internal-agents
type: Opaque
stringData:
  # GitHub PAT with repo + pull-request write scope
  GITHUB_TOKEN: "ghp_REPLACE_ME"

  # Webhook signature verification (set in your GitHub webhook config)
  GITHUB_WEBHOOK_SECRET: "REPLACE_ME"

  # LiteLLM gateway key (must match general_settings.master_key in litellm config)
  LITELLM_API_KEY: "sk-internal-agents-local"

  # External LLM API keys — leave empty when using Ollama/vLLM only
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""

  # Langfuse observability (optional)
  LANGFUSE_HOST: ""
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
