apiVersion: v1
kind: Namespace
metadata:
  name: ai-models
  labels:
    app.kubernetes.io/part-of: internal-agents
    purpose: agentic-ai
---
# Persistent volume for downloaded models — survives pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ai-models
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 80Gi  # Enough for 2-3 large models (e.g. qwen2.5-coder:32b ≈ 20GB)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-models
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  strategy:
    type: Recreate  # Single writer on the PVC
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: inference
    spec:
      # GPU scheduling — if your nodes have NVIDIA GPUs.
      # Remove the runtimeClassName and nvidia.com/gpu resource if running CPU-only.
      # runtimeClassName: nvidia-gpu
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
            # Limit parallel requests to prevent OOM on smaller GPUs
            - name: OLLAMA_NUM_PARALLEL
              value: "2"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "2"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /api/tags
              port: http
            failureThreshold: 30
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai-models
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: internal-agents
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - port: 11434
      targetPort: http
      protocol: TCP
      name: http
---
# Job that pulls the default models after Ollama starts.
# Runs once; delete and recreate to pull updated models.
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-pull
  namespace: ai-models
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: model-loader
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ollama
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Ollama to be ready..."
              until curl -sf http://ollama.ai-models.svc.cluster.local:11434/api/tags; do
                sleep 5
              done
              echo "Ollama is ready."
      containers:
        - name: pull-models
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              OLLAMA="http://ollama.ai-models.svc.cluster.local:11434"

              echo "==> Pulling qwen2.5-coder:1.5b (lightweight model for local dev)..."
              curl -sf "$OLLAMA/api/pull" -d '{"name":"qwen2.5-coder:1.5b"}'

              echo "==> Model pull complete."
              curl -sf "$OLLAMA/api/tags" | head -c 500
