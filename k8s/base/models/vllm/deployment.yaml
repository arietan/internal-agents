# vLLM — high-throughput inference server.
# Use this instead of Ollama when you need higher concurrency, continuous
# batching, or are running on multi-GPU nodes.
# Requires at least 1 NVIDIA GPU with ≥24GB VRAM for a 7B model.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai-models
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
        app.kubernetes.io/component: inference
    spec:
      runtimeClassName: nvidia-gpu
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "Qwen/Qwen2.5-Coder-32B-Instruct"
            - "--served-model-name"
            - "qwen2.5-coder:32b"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "16384"
            - "--trust-remote-code"
            # Multi-GPU: set tensor-parallel-size to number of GPUs
            # - "--tensor-parallel-size"
            # - "2"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_HOME
              value: /data/huggingface
          volumeMounts:
            - name: model-cache
              mountPath: /data
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 10
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
  namespace: ai-models
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: ai-models
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: internal-agents
spec:
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
