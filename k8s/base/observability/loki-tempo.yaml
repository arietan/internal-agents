# Loki — log aggregation backend for Grafana
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.4.2
          args: ["-config.file=/etc/loki/config.yaml"]
          ports:
            - containerPort: 3100
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: ai-observability
data:
  config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 168h
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: ai-observability
spec:
  selector:
    app.kubernetes.io/name: loki
  ports:
    - port: 3100
      targetPort: http
      name: http
---
# Tempo — distributed tracing backend for Grafana
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-tempo
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: grafana-tempo
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.7.2
          args: ["-config.file=/etc/tempo/config.yaml"]
          ports:
            - containerPort: 3200
              name: http
            - containerPort: 4317
              name: otlp-grpc
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: ai-observability
data:
  config.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    metrics_generator:
      processor:
        service_graphs:
          dimensions: [agent, provider, model]
        span_metrics:
          dimensions: [agent, provider, model]
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://prometheus.ai-observability.svc.cluster.local:9090/api/v1/write
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-tempo
  namespace: ai-observability
spec:
  selector:
    app.kubernetes.io/name: grafana-tempo
  ports:
    - port: 3200
      targetPort: http
      name: http
    - port: 4317
      targetPort: otlp-grpc
      name: otlp-grpc
