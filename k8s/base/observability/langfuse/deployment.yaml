# Langfuse — LLM observability: traces, token usage, prompt versioning, evals.
# Runs with a co-located PostgreSQL instance for local dev.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-postgres
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: langfuse
            - name: POSTGRES_USER
              value: langfuse
            - name: POSTGRES_PASSWORD
              value: langfuse-local
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-data
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  namespace: ai-observability
spec:
  selector:
    app.kubernetes.io/name: langfuse-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/component: llm-observability
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      initContainers:
        - name: wait-for-pg
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z langfuse-postgres 5432; do sleep 2; done']
      containers:
        - name: langfuse
          image: langfuse/langfuse:2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: DATABASE_URL
              value: "postgresql://langfuse:langfuse-local@langfuse-postgres.ai-observability.svc.cluster.local:5432/langfuse"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: nextauth-secret
                  optional: true
            - name: NEXTAUTH_URL
              value: "http://langfuse.ai-observability.svc.cluster.local:3000"
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: salt
                  optional: true
            - name: LANGFUSE_INIT_ORG_ID
              value: "internal-agents"
            - name: LANGFUSE_INIT_PROJECT_ID
              value: "ai-agents"
            - name: LANGFUSE_INIT_PUBLIC_KEY
              value: "pk-lf-internal-agents"
            - name: LANGFUSE_INIT_SECRET_KEY
              value: "sk-lf-internal-agents"
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-data
  namespace: ai-observability
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: langfuse
spec:
  selector:
    app.kubernetes.io/name: langfuse
  ports:
    - port: 3000
      targetPort: http
      name: http
---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: ai-observability
type: Opaque
stringData:
  nextauth-secret: "change-me-in-production-langfuse-secret"
  salt: "change-me-in-production-langfuse-salt"
