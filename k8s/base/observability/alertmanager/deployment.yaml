apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: ai-observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: self-healing
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # Critical alerts: shorter group wait for faster response
        - match:
            severity: critical
          receiver: self-healing
          group_wait: 10s
          repeat_interval: 1h

    receivers:
      - name: self-healing
        webhook_configs:
          - url: http://alert-receiver.ai-agents.svc.cluster.local:8082/webhook/alertmanager
            send_resolved: true
            max_alerts: 10

    inhibit_rules:
      # Suppress warning-level alerts when a critical alert fires for the same namespace
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [namespace]
      # Suppress high-severity alerts when critical fires for the same alertname
      - source_match:
          severity: critical
        target_match:
          severity: high
        equal: [alertname, namespace]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.28.1
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.listen-address=:9093"
          ports:
            - containerPort: 9093
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - port: 9093
      targetPort: http
      name: http
