apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ai-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager.ai-observability.svc.cluster.local:9093']

    remote_write:
      - url: "http://localhost:9090/api/v1/write"

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector.ai-observability.svc.cluster.local:13133']

      - job_name: 'agent-webhooks'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [ai-agents]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: webhook
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: agent
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      - job_name: 'litellm'
        metrics_path: /metrics
        static_configs:
          - targets: ['litellm.ai-models.svc.cluster.local:4000']

      - job_name: 'langfuse'
        metrics_path: /api/public/metrics
        static_configs:
          - targets: ['langfuse.ai-observability.svc.cluster.local:3000']

  agent-alerts.yml: |
    groups:
      - name: agent-alerts
        rules:
          - alert: AgentJobFailed
            expr: kube_job_status_failed{namespace="ai-agents"} > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Agent job {{ $labels.job_name }} failed"
              description: "Job {{ $labels.job_name }} in namespace {{ $labels.namespace }} has failed."

          - alert: AgentHighLLMLatency
            expr: histogram_quantile(0.95, rate(agent_llm_call_duration_seconds_bucket[5m])) > 60
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Agent LLM calls are slow (p95 > 60s)"

          - alert: AgentLLMErrors
            expr: rate(agent_llm_call_errors_total[5m]) > 0.1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Agent LLM error rate is elevated"

          - alert: OllamaDown
            expr: up{job="ollama"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Ollama inference server is down"

          - alert: LiteLLMDown
            expr: up{job="litellm"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "LiteLLM gateway is down"

      - name: application-alerts
        rules:
          - alert: AppHighErrorRate
            expr: >
              (rate(http_requests_total{status=~"5.."}[5m])
              / (rate(http_requests_total[5m]) + 0.001)) > 0.05
            for: 5m
            labels:
              severity: high
            annotations:
              summary: "High HTTP 5xx error rate (>5%)"
              description: "{{ $labels.namespace }}/{{ $labels.pod }} has a 5xx rate of {{ $value | humanizePercentage }}."

          - alert: AppHighLatency
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency (>2s)"
              description: "Service {{ $labels.service }} p95 latency is {{ $value }}s."

          - alert: AppPodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: high
            annotations:
              summary: "Pod {{ $labels.pod }} is crash-looping"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} ({{ $labels.namespace }}) is restarting."

          - alert: AppOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Container OOM-killed: {{ $labels.pod }}/{{ $labels.container }}"
              description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was OOM-killed. Consider increasing memory limits."

          - alert: SelfHealingWatcherFailed
            expr: kube_job_status_failed{namespace="ai-agents", job_name=~"telemetry-watcher.*"} > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Telemetry watcher job failed"
              description: "Self-healing telemetry watcher job {{ $labels.job_name }} has failed."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      serviceAccountName: prometheus-sa
      containers:
        - name: prometheus
          image: prom/prometheus:v3.2.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--web.enable-remote-write-receiver"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: agent-alerts.yml
                path: agent-alerts.yml
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: ai-observability
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: prometheus
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - port: 9090
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: ai-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-reader
rules:
  - apiGroups: [""]
    resources: [nodes, pods, services, endpoints]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-reader
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: ai-observability
roleRef:
  kind: ClusterRole
  name: prometheus-reader
  apiGroup: rbac.authorization.k8s.io
