apiVersion: v1
kind: ServiceAccount
metadata:
  name: coding-agent-sa
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: coding-agent
    app.kubernetes.io/part-of: internal-agents
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pr-review-agent-sa
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: pr-review-agent
    app.kubernetes.io/part-of: internal-agents
---
# The webhook listeners need permission to create Jobs in the namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-job-creator
  namespace: ai-agents
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coding-agent-job-creator
  namespace: ai-agents
subjects:
  - kind: ServiceAccount
    name: coding-agent-sa
    namespace: ai-agents
roleRef:
  kind: Role
  name: agent-job-creator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pr-review-agent-job-creator
  namespace: ai-agents
subjects:
  - kind: ServiceAccount
    name: pr-review-agent-sa
    namespace: ai-agents
roleRef:
  kind: Role
  name: agent-job-creator
  apiGroup: rbac.authorization.k8s.io
