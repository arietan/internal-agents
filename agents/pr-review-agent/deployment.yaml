apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-review-agent-webhook
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: pr-review-agent-webhook
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pr-review-agent-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pr-review-agent-webhook
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
    spec:
      serviceAccountName: pr-review-agent-sa
      containers:
        - name: webhook
          image: internal-agents/pr-review-agent:latest
          imagePullPolicy: Never
          command: ["python", "agents/pr-review-agent/webhook_listener.py"]
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - secretRef:
                name: agent-secrets
            - configMapRef:
                name: agent-config
          env:
            - name: AGENT_IMAGE
              value: internal-agents/pr-review-agent:latest
            - name: JOB_NAMESPACE
              value: ai-agents
            - name: REVIEW_ALL_PRS
              value: "false"
            - name: AUTO_ASSIGN_REVIEWER
              value: "true"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pr-review-agent-webhook
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: pr-review-agent-webhook
    app.kubernetes.io/part-of: internal-agents
spec:
  selector:
    app.kubernetes.io/name: pr-review-agent-webhook
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
