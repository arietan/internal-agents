apiVersion: batch/v1
kind: CronJob
metadata:
  name: coding-agent-scheduled
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: coding-agent
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: internal-agents
spec:
  schedule: "0 3 * * 1-5"  # Weekdays at 3 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 7200
      backoffLimit: 1
      activeDeadlineSeconds: 1800  # 30 min timeout
      template:
        metadata:
          labels:
            app.kubernetes.io/name: coding-agent
            app.kubernetes.io/component: runner
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9464"
        spec:
          serviceAccountName: coding-agent-sa
          restartPolicy: Never
          containers:
            - name: coding-agent
              image: internal-agents/coding-agent:latest
              imagePullPolicy: Never
              command: ["python", "agents/coding-agent/coding_agent.py"]
              envFrom:
                - secretRef:
                    name: agent-secrets
                - configMapRef:
                    name: agent-config
              env:
                - name: TRIGGER_EVENT
                  value: "scheduled"
              volumeMounts:
                - name: agent-config-vol
                  mountPath: /etc/agent
                  readOnly: true
                - name: audit-logs
                  mountPath: /var/log/agent-audit
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi
          volumes:
            - name: agent-config-vol
              configMap:
                name: agent-skills-rules
            - name: audit-logs
              emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coding-agent-webhook
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: coding-agent-webhook
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: internal-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coding-agent-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coding-agent-webhook
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
    spec:
      serviceAccountName: coding-agent-sa
      containers:
        - name: webhook
          image: internal-agents/coding-agent:latest
          imagePullPolicy: Never
          command: ["python", "agents/coding-agent/webhook_listener.py"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: agent-secrets
            - configMapRef:
                name: agent-config
          env:
            - name: AGENT_IMAGE
              value: internal-agents/coding-agent:latest
            - name: JOB_NAMESPACE
              value: ai-agents
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: coding-agent-webhook
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: coding-agent-webhook
    app.kubernetes.io/part-of: internal-agents
spec:
  selector:
    app.kubernetes.io/name: coding-agent-webhook
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
